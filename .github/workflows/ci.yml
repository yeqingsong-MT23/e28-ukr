name: CI

on:
  push:
    branches:
      - main
      - codex/test-pr
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m py_compile $(git ls-files '*.py')
